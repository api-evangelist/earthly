aid: earthly
name: Earthly
description: >-
  Earthly is an open source build automation tool that combines the best of Dockerfiles
  and Makefiles into a single, consistent build system, providing reproducible builds
  that run the same way on a developer laptop as they do in CI. Earthly Cloud and
  Earthly Lunar extend the open source CLI with hosted runners and code governance
  guardrails. No public REST or GraphQL API has been published; integration is via
  the Earthly CLI and Earthfile build definitions.
